<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a-scene {
      width: 100%;
      height: 100%;
    }

    #audio-btn {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      right: 16px;
      z-index: 20000;
      font-size: 18px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    #start-btn {
      position: fixed;
      top: 70%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20001;
      font-size: 20px;
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: targets01.mind;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
    embedded
  >
    <a-assets>
      <video
        id="video"
        src="https://yair.aronshtam.net/alive/img/01.mp4"
        loop
        muted
        playsinline
        webkit-playsinline
        preload="auto"
        crossorigin="anonymous"
      ></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-video src="#video" width="1" height="0.66" position="0 0 0"></a-video>
    </a-entity>
  </a-scene>

  <button id="audio-btn" type="button">Muted</button>
  <button id="start-btn" type="button" style="display:none;">Show</button>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.querySelector("#video");
      const audioBtn = document.querySelector("#audio-btn");
      const target = document.querySelector("[mindar-image-target]");
      const startBtn = document.querySelector("#start-btn");

      const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent)
        || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      let isVideoUnlocked = !isIOS;

      video.muted = true;
      video.playsInline = true;
      video.setAttribute("playsinline", "");
      video.setAttribute("webkit-playsinline", "");
      video.setAttribute("muted", "");

      if (isIOS) {
        startBtn.style.display = "block";
      }

      const unlockVideo = async () => {
        try {
          await video.play();
          video.pause();
          isVideoUnlocked = true;
          startBtn.style.display = "none";
        } catch (e) {
          console.log("Start failed:", e);
        }
      };

      const safeTap = (el, handler) => {
        el.addEventListener("click", handler);
        el.addEventListener("touchend", (e) => {
          e.preventDefault();
          handler();
        }, { passive: false });
      };

      safeTap(startBtn, unlockVideo);

      safeTap(audioBtn, () => {
        if (!isVideoUnlocked) {
          startBtn.style.display = "block";
          return;
        }

        video.muted = !video.muted;
        audioBtn.textContent = video.muted ? "Muted" : "Sound On";
      });

      target.addEventListener("targetFound", async () => {
        if (!isVideoUnlocked) {
          startBtn.style.display = "block";
          return;
        }

        video.currentTime = 0;
        try {
          await video.play();
        } catch (e) {
          console.log("Play failed:", e);
          startBtn.style.display = "block";
        }
      });

      target.addEventListener("targetLost", () => {
        video.pause();
      });
    });
  </script>
</body>
</html>
